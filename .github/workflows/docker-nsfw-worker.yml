name: Build & Push NSFW Worker

on:
  push:
    branches: [main]
    paths:
      - "runpod-mdcln/**"
      - ".github/workflows/docker-nsfw-worker.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mconwf
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./runpod-mdcln
          push: true
          tags: |
            mconwf/modelclone-worker:latest
            mconwf/modelclone-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
