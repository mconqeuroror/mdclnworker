name: Build & Push NSFW Worker

on:
  push:
    branches: [main]
    paths:
      - "runpod-mdcln/**"
      - ".github/workflows/docker-nsfw-worker.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-8core
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space for baked model layers
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mconwf
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-mdcln
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            mconwf/modelclone-worker:latest
            mconwf/modelclone-worker:${{ github.sha }}
          build-args: |
            CIVITAI_API_KEY=${{ secrets.CIVITAI_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
